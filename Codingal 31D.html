<!DOCTYPE html>
<html>

<head>
    <title>JavaScript Callbacks</title>
</head>

<body>
  <h2>JavaScript Callbacks</h2>
  <p>Do A Calculation And Then Display The Result.</p>
  <p id="result"></p>

    <script>
        function greet(name, callback) {
            console.log("Hello" + name);
            callback();
        }

        function sayBye() {
            console.log("GoodBye!");
        }

        greet("Ved", sayBye);


    </script>
</body>

</html>
