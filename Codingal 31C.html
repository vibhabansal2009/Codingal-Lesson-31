<!DOCTYPE html>
<html>

<head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css"/>
</head>

<body>
    <script>

let pizzaOrder = new Promise(function(resolve, reject) {

    let shopOpen = false;

    if (shopOpen) {
        resolve("Pizza Delivered Successfully!");
    } else {
        reject("Shop is Closed. No Pizza Today.");
    }
});

pizzaOrder
     .then(function(message) {
        console.log(message);
     })
    .catch(function(error) {
        console.log(error);
    });


 </script>
</body>

</html>
